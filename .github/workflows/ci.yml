name: measure_metrics.yml
on:
  push:
    branches:
      - master

jobs:
  analyze:
    name: Code Metrics Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Start Energy Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          task: start-measurement

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install radon lizard pylint mccabe xenon pycodestyle cognitive-complexity
          pip install cloc scc

      - id: measurement-4
        name: Record Measurement After Install dependencies
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Install dependencies
          task: get-measurement

      - name: Analyze with Radon
        continue-on-error: true
        run: |
          echo "=== Cyclomatic Complexity ===" > metrics_report.txt
          radon cc . --show-complexity --average >> metrics_report.txt
          echo -e "\n=== Maintainability Index ===" >> metrics_report.txt
          radon mi . --show >> metrics_report.txt
          echo -e "\n=== Raw Metrics ===" >> metrics_report.txt
          radon raw . --summary >> metrics_report.txt
          echo -e "\n=== Halstead Metrics ===" >> metrics_report.txt
          radon hal . >> metrics_report.txt

      - id: measurement-6
        name: Record Measurement After Analyze with Radon
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Analyze with Radon
          task: get-measurement

      - name: Analyze with Lizard
        continue-on-error: true
        run: |
          echo -e "\n=== Detailed Code Metrics ===" >> metrics_report.txt
          lizard . --CCN 10 --length 100 --arguments 5 --extension duplicate --modified --working_threads 1 >> metrics_report.txt || echo "Lizard analysis completed with warnings"

      - id: measurement-8
        name: Record Measurement After Analyze with Lizard
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Analyze with Lizard
          task: get-measurement

      - name: Analyze with Pylint
        continue-on-error: true
        run: |
          echo -e "\n=== Code Quality Metrics ===" >> metrics_report.txt
          pylint --output-format=text . >> metrics_report.txt || echo "Pylint analysis completed with warnings"

      - id: measurement-10
        name: Record Measurement After Analyze with Pylint
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Analyze with Pylint
          task: get-measurement

      - name: Check complexity thresholds with Xenon
        continue-on-error: true
        run: |
          echo -e "\n=== Complexity Thresholds ===" >> metrics_report.txt
          xenon --max-absolute A --max-modules A --max-average A . >> metrics_report.txt || echo "Xenon analysis completed with warnings"

      - id: measurement-12
        name: Record Measurement After Check complexity thresholds with Xenon
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Check complexity thresholds with Xenon
          task: get-measurement

      - name: Generate detailed reports
        continue-on-error: true
        run: |
          mkdir -p metrics
          # JSON reports
          radon cc . --json > metrics/complexity.json || echo "Failed to generate complexity.json"
          radon raw . --json > metrics/raw_metrics.json || echo "Failed to generate raw_metrics.json"
          radon hal . --json > metrics/halstead.json || echo "Failed to generate halstead.json"
          lizard . --xml > metrics/lizard_report.xml || echo "Failed to generate lizard_report.xml"
          cp metrics_report.txt metrics/full_report.txt || echo "Failed to copy full report"

      - id: measurement-14
        name: Record Measurement After Generate detailed reports
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          label: Generate detailed reports
          task: get-measurement

      - name: Upload metrics results
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: code-metrics
          path: metrics/

      - id: display-measurement
        name: Display Energy Results
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          json-output: true
          task: display-results

      - name: Save Total Energy Consumption Data
        continue-on-error: true
        run: echo '${{ steps.display-measurement.outputs.data-total-json }}' > total_energy_consumption.json

      - name: Upload Energy Consumption Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: total-energy-consumption
          path: total_energy_consumption.json